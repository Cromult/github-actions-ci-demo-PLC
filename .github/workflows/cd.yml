name: CD Pipeline - Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen (Multi-stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Etiquetado con 'latest' y con el SHA del commit para trazabilidad
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/api-crud:latest
            ${{ secrets.DOCKER_USERNAME }}/api-crud:${{ github.sha }}

      - name: Escaneo de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/api-crud:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Uso de GitHub Environments para gestionar secretos por entorno
    environment: production
    steps:
      - name: Desplegar en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Asegurar que existe una red compartida para los contenedores
            docker network create crud-network || true
            
            # 2. Asegurar que la base de datos esté conectada a dicha red
            docker network connect crud-network api_db || true
            
            # 3. Limpiar el contenedor de la API anterior
            docker stop api-container || true
            docker rm api-container || true
            
            # 4. Descargar la imagen más reciente desde Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/api-crud:latest
            
            # 5. Ejecutar el nuevo contenedor en la red compartida
            # Se usa el nombre del contenedor 'api_db' como host de la base de datos
            docker run -d \
              --name api-container \
              --network crud-network \
              --restart unless-stopped \
              -p 80:3000 \
              -e DB_USER=admin \
              -e DB_PASSWORD=secretpassword \
              -e DB_NAME=crud_db \
              -e DB_HOST=api_db \
              ${{ secrets.DOCKER_USERNAME }}/api-crud:latest