name: CD Pipeline - Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen (Multi-stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Etiquetado semántico y por SHA del commit
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/api-crud:latest
            ${{ secrets.DOCKER_USERNAME }}/api-crud:${{ github.sha }}

      - name: Escaneo de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/api-crud:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Uso de GitHub Environments para gestionar secretos por entorno
    environment: production
    steps:
      - name: Desplegar en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Detener contenedores previos para limpiar el puerto 80
            docker stop api-container || true
            docker rm api-container || true
            
            # Descargar la imagen más reciente
            docker pull ${{ secrets.DOCKER_USERNAME }}/api-crud:latest
            
            # Ejecutar el contenedor mapeando el puerto 80 al 3000 interno
            docker run -d \
              --name api-container \
              --restart unless-stopped \
              -p 80:3000 \
              -e DB_USER=admin \
              -e DB_PASSWORD=secretpassword \
              -e DB_NAME=crud_db \
              -e DB_HOST=${{ secrets.SSH_HOST }} \
              ${{ secrets.DOCKER_USERNAME }}/api-crud:latest